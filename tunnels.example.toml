# houdinny tunnel configuration
#
# Copy this file to tunnels.toml and edit with your tunnel details.
# tunnels.toml is gitignored (may contain private keys).

[proxy]
listen = "127.0.0.1:8080"
mode = "transparent"          # "transparent" (default) or "mitm"
strategy = "random"           # "random", "round-robin", "least-connections"

# --- Tor (zero-config, works out of the box) ---

[[tunnel]]
protocol = "tor"
circuits = 5                  # number of separate Tor circuits (exit IPs)
rotate_interval = "10m"       # build fresh circuits every N minutes
label = "tor-default"

