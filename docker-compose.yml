# houdinny — Privacy proxy for AI agents
#
# Usage:
#   1. Copy .env.example to .env and fill in your credentials
#   2. docker compose up -d
#   3. export HTTP_PROXY=http://localhost:8080
#   4. Your requests now rotate across VPN tunnels
#
# To add more countries, duplicate a vpn-* + proxy-* service pair.

services:
  # VPN tunnel — change CONNECT to any country
  # See: https://nordvpn.com/servers/tools/ for country names
  vpn-1:
    image: ghcr.io/bubuntux/nordvpn
    container_name: houdinny-vpn-1
    cap_add: [NET_ADMIN, NET_RAW]
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - TOKEN=${NORD_TOKEN}
      - CONNECT=United_States
      - TECHNOLOGY=NordLynx
      - NETWORK=172.20.0.0/16
    networks:
      houdinny-net:
        ipv4_address: 172.20.0.10

  vpn-2:
    image: ghcr.io/bubuntux/nordvpn
    container_name: houdinny-vpn-2
    cap_add: [NET_ADMIN, NET_RAW]
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - TOKEN=${NORD_TOKEN}
      - CONNECT=Germany
      - TECHNOLOGY=NordLynx
      - NETWORK=172.20.0.0/16
    networks:
      houdinny-net:
        ipv4_address: 172.20.0.11

  vpn-3:
    image: ghcr.io/bubuntux/nordvpn
    container_name: houdinny-vpn-3
    cap_add: [NET_ADMIN, NET_RAW]
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      - TOKEN=${NORD_TOKEN}
      - CONNECT=Japan
      - TECHNOLOGY=NordLynx
      - NETWORK=172.20.0.0/16
    networks:
      houdinny-net:
        ipv4_address: 172.20.0.12

  # houdinny proxy
  houdinny:
    build: .
    container_name: houdinny
    ports:
      - "8080:8080"
    volumes:
      - ./tunnels.docker.toml:/etc/houdinny/tunnels.toml:ro
    command: ["-c", "/etc/houdinny/tunnels.toml"]
    depends_on: [vpn-1, vpn-2, vpn-3]
    networks:
      houdinny-net:
        ipv4_address: 172.20.0.20

networks:
  houdinny-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
